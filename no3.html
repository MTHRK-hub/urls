<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Links No.3</title>
  <script>
    window.onload = function () {
      const urls = [
        // (7) SNS用文章
        "https://docs.google.com/spreadsheets/d/1Hb4WSu-46Z78PVQejWYdtLoVfcYQFGsu61UHHwrW8ds/edit?gid=0#gid=0",
        // (8) Canva (Instagram投稿用)
        "https://www.canva.com/folder/FAFmD-ZNWDA",
        // (9) note
        "https://note.com/kihitoromi",
        // (10) 動画格納用
        "https://drive.google.com/drive/folders/1q1Sy7Lh6kAgfIEyg0N1O9YOXGbTdZGS-"
      ];
      urls.forEach(url => window.open(url, "_blank"));

      // 空のタグを閉じる
      window.close();
    };
  </script>
</head>

<body>
  <p>リンクを開いています…</p>
</body>

</html>
